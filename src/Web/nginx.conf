server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /config.json {
        alias /usr/share/nginx/html/config.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
